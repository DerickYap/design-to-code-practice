<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Card</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
        }

        .card {
            max-width: 360px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card-image {
            width: 100%;
            height: 240px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            margin: 0 0 8px 0;
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .card-location {
            margin: 0 0 16px 0;
            font-size: 14px;
            color: #666;
        }

        .card-price {
            font-size: 24px;
            font-weight: 700;
            color: #216bff;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-image"></div>
        <div class="card-content">
            <h2 class="card-title">Modern Apartment</h2>
            <p class="card-location">Marina Bay, Singapore</p>
            <div class="card-price">$2,800,000</div>
        </div>
    </div>
</body>
</html>
